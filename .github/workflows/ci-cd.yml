name: IoT Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências de Teste
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f ./ETL/requirements.txt ]; then pip install -r ./ETL/requirements.txt; fi

      - name: Analisar Código com Flake8 (Lint)
        run: |
          # Para parar o build se houver erros de sintaxe do Python
          flake8 ./ETL --count --select=E9,F63,F7,F82 --show-source --statistics

  build-docker-image:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da Imagem ETL
        uses: docker/build-push-action@v5
        with:
          context: ./ETL
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/agro-etl:latest